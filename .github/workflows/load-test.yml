name: Manual Load Test with k6

on:
  workflow_dispatch: # ทำให้มีปุ่มกด Run workflow ในหน้าเว็บ GitHub
  schedule:
    - cron: '*/3 * * * *' # รันอัตโนมัติทุกๆ 3 นาที

jobs:
  k6_load_test:
    name: Run k6 Load Test
    runs-on: ubuntu-latest # ใช้เครื่อง Linux ของ GitHub ฟรี

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: loadtest.js # ชื่อไฟล์สคริปต์ k6 ของคุณ