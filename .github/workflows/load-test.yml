name: Manual Load Test with k6

on:
  workflow_dispatch: # ทำให้มีปุ่มกด Run workflow ในหน้าเว็บ GitHub
  schedule:
    - cron: '0 */2 * * *' # รันอัตโนมัติทุกๆ 2 ชั่วโมง

jobs:
  k6_load_test:
    name: k6 Load Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run k6 test
        uses: grafana/setup-k6-action@v1

      - name: Execute load test
        run: k6 run loadtest.js